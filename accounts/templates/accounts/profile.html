<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening profilim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Mening profilim</h4>
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-4">
                            {% if profile.avatar %}
                                <img src="{{ profile.avatar.url }}" class="rounded-circle" width="150" height="150">
                            {% else %}
                                <div class="bg-secondary text-white d-inline-flex align-items-center justify-content-center rounded-circle"
                                     style="width:150px;height:150px; font-size: 50px;">
                                    {{ request.user.username|first|upper }}
                                </div>
                            {% endif %}
                        </div>

                        <h3>{{ request.user.username }}</h3>
                        <p>Email: {{ request.user.email }}</p>

                        {% if profile.bio %}
                            <p><strong>Bio:</strong> {{ profile.bio }}</p>
                        {% endif %}

                        <a href="{% url 'accounts:edit_profile' %}" class="btn btn-primary">
                            Profilni tahrirlash
                        </a>
                        <a href="{% url 'post_list' %}" class="btn btn-secondary">
                            Orqaga
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
