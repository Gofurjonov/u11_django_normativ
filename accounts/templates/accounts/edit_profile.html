<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilni tahrirlash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Profilni tahrirlash</h4>
                    </div>
                    <div class="card-body">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}

                            <div class="text-center mb-4">
                                {% if request.user.profile.avatar %}
                                    <img src="{{ request.user.profile.avatar.url }}" class="rounded-circle mb-3" width="150" height="150">
                                {% endif %}
                            </div>

                            {{ form.as_p }}

                            <button type="submit" class="btn btn-primary">Saqlash</button>
                            <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">Bekor qilish</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
