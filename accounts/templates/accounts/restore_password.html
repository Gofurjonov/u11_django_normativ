<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Yangi parol o'rnatish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            background-color: rgba(255,255,255,0.95);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            padding: 25px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-control {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .alert {
            border-radius: 10px;
            padding: 12px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h4 class="mb-0">🔐 Yangi parol o'rnatish</h4>
                    </div>
                    <div class="card-body p-5">

                        <!-- Messages -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <!-- Info box -->
                        <div class="info-box">
                            <strong>📧 Email:</strong> {{ email }}<br>
                            <small class="text-muted">Kod 2 daqiqa amal qiladi</small>
                        </div>

                        <!-- Form -->
                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-4">
                                <label class="form-label fw-bold">6 xonali kod</label>
                                <input type="text"
                                       name="code"
                                       class="form-control"
                                       placeholder="123456"
                                       maxlength="6"
                                       pattern="[0-9]{6}"
                                       title="6 xonali son kiriting"
                                       required>
                                <small class="text-muted">Emailga yuborilgan kodni kiriting</small>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Yangi parol</label>
                                <input type="password"
                                       name="new_password"
                                       class="form-control"
                                       placeholder="••••••••"
                                       minlength="6"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Parolni tasdiqlang</label>
                                <input type="password"
                                       name="confirm_password"
                                       class="form-control"
                                       placeholder="••••••••"
                                       minlength="6"
                                       required>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                Parolni yangilash
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <a href="{% url 'accounts:login' %}" class="text-decoration-none">
                                ← Kirish sahifasiga qaytish
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
