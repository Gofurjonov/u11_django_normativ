<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">{{ post.title }}</h3>
            </div>
            <div class="card-body">
                <!-- Rasm bor bo'lsa, katta qilib ko'rsatish -->
                {% if post.image %}
                <div class="text-center mb-4">
                    <img src="{{ post.image.url }}"
                         class="img-fluid rounded"
                         style="max-height: 400px;"
                         alt="{{ post.title }}">
                </div>
                {% endif %}

                <!-- Post matni -->
                <div class="mb-4">
                    <h5>Matn:</h5>
                    <p>{{ post.content|linebreaks }}</p>
                </div>

                <!-- Metadata -->
                <div class="text-muted">
                    <p><strong>Yaratilgan:</strong> {{ post.created_at|date:"d.m.Y H:i" }}</p>
                    <p><strong>Yangilangan:</strong> {{ post.updated_at|date:"d.m.Y H:i" }}</p>
                </div>

                <!-- Tugmalar -->
                <div class="mt-4">
                    <a href="{% url 'post_list' %}" class="btn btn-secondary">Orqaga</a>
                    {% if perms.posts.change_post %}
                    <a href="{% url 'post_update' post.id %}" class="btn btn-warning">Tahrirlash</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
