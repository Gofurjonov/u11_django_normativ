<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faylni tiklash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h4 class="mb-0">
                            <i class="bi bi-arrow-repeat me-2"></i>
                            Faylni tiklash
                        </h4>
                    </div>
                    <div class="card-body p-4 text-center">
                        <i class="bi bi-arrow-repeat text-success display-1 mb-3"></i>

                        <h5 class="mb-3">Bu faylni tiklashni xohlaysizmi?</h5>

                        <div class="alert alert-secondary text-start mt-3">
                            <p class="mb-2"><strong>Fayl nomi:</strong> {{ document.title }}</p>
                            <p class="mb-2"><strong>Fayl:</strong> {{ document.filename }}</p>
                            <p class="mb-2"><strong>Hajmi:</strong> {{ document.file.size|filesizeformat }}</p>
                            <p class="mb-0"><strong>Yuklangan:</strong> {{ document.uploaded_at|date:"d.m.Y H:i" }}</p>
                        </div>

                        <form method="post" class="mt-4">
                            {% csrf_token %}
                            <div class="d-flex gap-2 justify-content-center">
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-check-circle me-2"></i>
                                    Ha, tiklash
                                </button>
                                <a href="{% url 'uploads:upload_list' %}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-x-lg me-2"></i>
                                    Bekor qilish
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
